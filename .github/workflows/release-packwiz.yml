name: Release Packwiz Pack

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install packwiz
        shell: bash
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Read pack metadata
        id: meta
        shell: bash
        run: |
          PACK_NAME="$(grep '^name = ' pack.toml | sed 's/name = "\(.*\)"/\1/')"
          PACK_VERSION="$(grep '^version = ' pack.toml | sed 's/version = "\(.*\)"/\1/')"
          SAFE_NAME="$(echo "$PACK_NAME" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9._-')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "pack_name=$PACK_NAME" >> "$GITHUB_OUTPUT"
          echo "pack_version=$PACK_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=$SAFE_NAME-$PACK_VERSION-build-$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          PREVIOUS_TAG="$(git tag --list '${{ steps.meta.outputs.safe_name }}-*' --sort=-creatordate | head -n 1 || true)"

          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..HEAD"
            RANGE_LABEL="since $PREVIOUS_TAG"
          else
            RANGE="HEAD"
            RANGE_LABEL="from repository history"
          fi

          COMMITS="$(git log "$RANGE" --pretty=format:'%s%x09%h' || true)"

          {
            echo "## ${{ steps.meta.outputs.pack_name }} ${{ steps.meta.outputs.pack_version }}"
            echo ""
            echo "Automated packwiz release for commit ${{ steps.meta.outputs.short_sha }}."
            echo ""
            echo "Changelog generated from semantic commits $RANGE_LABEL."
          } > release-notes.md

          add_section() {
            local title="$1"
            local pattern="$2"
            local matches
            matches="$(printf '%s\n' "$COMMITS" | awk -F '\t' -v pattern="$pattern" 'tolower($1) ~ pattern { print "- " $1 " (`" $2 "`)" }')"

            if [ -n "$matches" ]; then
              {
                echo ""
                echo "## $title"
                printf '%s\n' "$matches"
              } >> release-notes.md
            fi
          }

          add_section "Breaking Changes" '^[a-z]+(\([^)]+\))?!:'
          add_section "Novidades" '^feat(\([^)]+\))?!?:'
          add_section "Correcoes" '^fix(\([^)]+\))?!?:'
          add_section "Performance" '^perf(\([^)]+\))?!?:'
          add_section "Refatoracoes" '^refactor(\([^)]+\))?!?:'
          add_section "Documentacao" '^docs(\([^)]+\))?!?:'
          add_section "Manutencao" '^(ci|build|chore)(\([^)]+\))?!?:'

          OTHER_COMMITS="$(printf '%s\n' "$COMMITS" | awk -F '\t' 'length($1) > 0 && tolower($1) !~ /^[a-z]+(\([^)]+\))?!?:/ { print "- " $1 " (`" $2 "`)" }')"
          if [ -n "$OTHER_COMMITS" ]; then
            {
              echo ""
              echo "## Outros"
              printf '%s\n' "$OTHER_COMMITS"
            } >> release-notes.md
          fi

          if ! grep -q '^- ' release-notes.md; then
            {
              echo ""
              echo "## Alteracoes"
              echo "- Nenhum commit semantico encontrado no intervalo."
            } >> release-notes.md
          fi

          {
            echo ""
            echo "## Assets"
            echo "- Client pack: ${{ steps.meta.outputs.safe_name }}-${{ steps.meta.outputs.pack_version }}-client.zip"
            echo "- Server pack: ${{ steps.meta.outputs.safe_name }}-${{ steps.meta.outputs.pack_version }}-server.zip"
          } >> release-notes.md

          cat release-notes.md

      - name: Refresh packwiz index
        run: packwiz refresh

      - name: Export client and server packs
        shell: bash
        run: |
          mkdir -p dist
          packwiz curseforge export -s client -o "dist/${{ steps.meta.outputs.safe_name }}-${{ steps.meta.outputs.pack_version }}-client.zip"
          packwiz curseforge export -s server -o "dist/${{ steps.meta.outputs.safe_name }}-${{ steps.meta.outputs.pack_version }}-server.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" dist/*.zip \
            --target "$GITHUB_SHA" \
            --title "${{ steps.meta.outputs.pack_name }} ${{ steps.meta.outputs.pack_version }} build ${{ github.run_number }}" \
            --notes-file release-notes.md
