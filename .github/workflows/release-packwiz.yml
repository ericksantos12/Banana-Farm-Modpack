name: Build and Release Packwiz Pack
run-name: "Packwiz Build #${{ github.run_number }}"

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEV_ENVIRONMENT: ${{ github.ref_name != 'main' }}

jobs:
  info:
    name: Pack Info
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.meta.outputs.project_name }}
      project_version: ${{ steps.meta.outputs.project_version }}
      project_file_name: ${{ steps.meta.outputs.project_file_name }}
      project_full_name: ${{ steps.meta.outputs.project_full_name }}
      safe_name: ${{ steps.meta.outputs.safe_name }}
      tag: ${{ steps.meta.outputs.tag }}
      minecraft_version: ${{ steps.meta.outputs.minecraft_version }}
      loader_version: ${{ steps.meta.outputs.loader_version }}
      loader_type: ${{ steps.meta.outputs.loader_type }}
      release_type: ${{ steps.meta.outputs.release_type }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      changelog: ${{ steps.changelog.outputs.body }}
      make_pr: ${{ steps.meta.outputs.make_pr }}
      make_release: ${{ steps.meta.outputs.make_release }}
      webhook_present: ${{ steps.webhook.outputs.present }}
      send_discord: ${{ steps.webhook.outputs.send_discord }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check packwiz files
        shell: bash
        run: |
          test -f pack.toml || { echo "Could not find pack.toml"; exit 1; }
          test -f index.toml || { echo "Could not find index.toml"; exit 1; }

      - name: Read pack metadata
        id: meta
        shell: bash
        env:
          PACK_RELEASE_TYPE: ${{ vars.RELEASE_TYPE }}
        run: |
          PACK_NAME="$(grep '^name = ' pack.toml | sed 's/name = "\(.*\)"/\1/')"
          PACK_VERSION="$(grep '^version = ' pack.toml | sed 's/version = "\(.*\)"/\1/')"
          MINECRAFT_VERSION="$(grep '^minecraft = ' pack.toml | sed 's/minecraft = "\(.*\)"/\1/')"
          LOADER_VERSION="$(grep '^forge = ' pack.toml | sed 's/forge = "\(.*\)"/\1/')"
          SAFE_NAME="$(echo "$PACK_NAME" | tr '[:upper:] ' '[:lower:]-' | tr -cd 'a-z0-9._-')"
          PROJECT_FILE_NAME="$SAFE_NAME-$PACK_VERSION"
          TAG="$SAFE_NAME-$PACK_VERSION-build-$GITHUB_RUN_NUMBER"
          RELEASE_TYPE="${PACK_RELEASE_TYPE:-release}"

          case "$RELEASE_TYPE" in
            release|beta|alpha)
              ;;
            *)
              echo "Invalid RELEASE_TYPE: $RELEASE_TYPE"
              echo "Use one of: release, beta, alpha"
              exit 1
              ;;
          esac

          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            PRERELEASE="false"
            MAKE_PR="false"
            MAKE_RELEASE="true"
          else
            PRERELEASE="true"
            MAKE_PR="true"
            MAKE_RELEASE="false"
          fi

          echo "project_name=$PACK_NAME" >> "$GITHUB_OUTPUT"
          echo "project_version=$PACK_VERSION" >> "$GITHUB_OUTPUT"
          echo "project_file_name=$PROJECT_FILE_NAME" >> "$GITHUB_OUTPUT"
          echo "project_full_name=$PACK_NAME $PACK_VERSION" >> "$GITHUB_OUTPUT"
          echo "safe_name=$SAFE_NAME" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "minecraft_version=$MINECRAFT_VERSION" >> "$GITHUB_OUTPUT"
          echo "loader_version=$LOADER_VERSION" >> "$GITHUB_OUTPUT"
          echo "loader_type=forge" >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "make_pr=$MAKE_PR" >> "$GITHUB_OUTPUT"
          echo "make_release=$MAKE_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Generate packwiz mod changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
          base_ref="$latest_tag"

          name_from_file() {
            local file="$1"
            grep '^name = ' "$file" | sed 's/name = "\(.*\)"/\1/' || true
          }

          name_from_ref() {
            local ref="$1"
            local file="$2"
            git show "$ref:$file" 2>/dev/null | grep '^name = ' | sed 's/name = "\(.*\)"/\1/' || true
          }

          append_item() {
            local file="$1"
            local name="$2"
            if [[ -z "$name" ]]; then
              name="$file"
            fi
            printf -- '- %s' "$name"
          }

          added=""
          removed=""
          changed=""

          if [[ -z "$base_ref" ]]; then
            while IFS= read -r file; do
              added+="$(append_item "$file" "$(name_from_file "$file")")"$'\n'
            done < <(find mods -name '*.pw.toml' -type f | sort)
          else
            while IFS=$'\t' read -r status file previous_file; do
              case "$status" in
                A)
                  added+="$(append_item "$file" "$(name_from_file "$file")")"$'\n'
                  ;;
                D)
                  removed+="$(append_item "$file" "$(name_from_ref "$base_ref" "$file")")"$'\n'
                  ;;
                M)
                  changed+="$(append_item "$file" "$(name_from_file "$file")")"$'\n'
                  ;;
                R*)
                  removed+="$(append_item "$file" "$(name_from_ref "$base_ref" "$file")")"$'\n'
                  added+="$(append_item "$previous_file" "$(name_from_file "$previous_file")")"$'\n'
                  ;;
              esac
            done < <(git diff --name-status "$base_ref"..HEAD -- 'mods/*.pw.toml')
          fi

          {
            echo 'body<<EOF'
            echo "## Packwiz mod changes"
            echo
            if [[ -n "$base_ref" ]]; then
              echo "Compared against tag: \`$base_ref\`"
            else
              echo "No previous tag found. Listing current mods as added."
            fi
            echo
            echo "### Added"
            if [[ -n "$added" ]]; then
              printf '%s' "$added"
            else
              echo "- None"
            fi
            echo
            echo "### Removed"
            if [[ -n "$removed" ]]; then
              printf '%s' "$removed"
            else
              echo "- None"
            fi
            echo
            echo "### Changed"
            if [[ -n "$changed" ]]; then
              printf '%s' "$changed"
            else
              echo "- None"
            fi
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<'EOF'
          **Name**: ${{ steps.meta.outputs.project_name }}
          **Release**: `${{ steps.meta.outputs.project_version }}`
          **Release Type**: `${{ steps.meta.outputs.release_type }}`
          **Game Version**: `${{ steps.meta.outputs.minecraft_version }}`
          **Loader**: `${{ steps.meta.outputs.loader_type }}-${{ steps.meta.outputs.loader_version }}`
          **Prerelease**: `${{ steps.meta.outputs.prerelease }}`
          EOF

      - name: Check Discord webhook
        id: webhook
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK" ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "send_discord=false" >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF_NAME" == "main" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "send_discord=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "send_discord=false" >> "$GITHUB_OUTPUT"
          fi

  create-pr:
    name: Create Release PR
    needs: [info]
    runs-on: ubuntu-latest
    if: needs.info.outputs.make_pr == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check existing PR
        id: existing_pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          number="$(gh pr list --head dev --base main --state open --json number --jq '.[0].number // empty')"
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Write PR body
        shell: bash
        run: |
          cat > pr-body.md <<'EOF'
          **This is an automated Pull Request from the dev branch.**

          **Name**: ${{ needs.info.outputs.project_name }}
          **Release**: `${{ needs.info.outputs.project_version }}`
          **Release Type**: `${{ needs.info.outputs.release_type }}`
          **Game Version**: `${{ needs.info.outputs.minecraft_version }}`
          **Loader**: `${{ needs.info.outputs.loader_type }}-${{ needs.info.outputs.loader_version }}`

          ${{ needs.info.outputs.changelog }}
          EOF

      - name: Create release PR
        if: steps.existing_pr.outputs.number == ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --draft \
            --title "Release: ${{ needs.info.outputs.project_version }}" \
            --body-file pr-body.md

      - name: Update release PR
        if: steps.existing_pr.outputs.number != ''
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ steps.existing_pr.outputs.number }}" \
            --title "Release: ${{ needs.info.outputs.project_version }}" \
            --body-file pr-body.md

  build-project:
    name: Build Project
    needs: [info]
    runs-on: ubuntu-latest
    if: needs.info.outputs.make_release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache Go build data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-packwiz

      - name: Install packwiz
        shell: bash
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Refresh packwiz index
        run: packwiz refresh

      - name: Export client and server packs
        shell: bash
        run: |
          mkdir -p dist
          packwiz curseforge export -s client -o "dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip"
          packwiz curseforge export -s server -o "dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip"

      - name: Upload CurseForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.info.outputs.project_file_name }}-curseforge
          path: dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip
          if-no-files-found: error

      - name: Upload serverpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.info.outputs.project_file_name }}-serverpack
          path: dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip
          if-no-files-found: error

#      - name: Export Modrinth pack
#        shell: bash
#        run: |
#          packwiz modrinth export -o "dist/${{ needs.info.outputs.project_file_name }}-modrinth.mrpack"
#
#      - name: Upload Modrinth artifact
#        uses: actions/upload-artifact@v4
#        with:
#          name: ${{ needs.info.outputs.project_file_name }}-modrinth
#          path: dist/${{ needs.info.outputs.project_file_name }}-modrinth.mrpack
#          if-no-files-found: error

  release-github:
    name: Release to GitHub
    needs: [info, build-project]
    runs-on: ubuntu-latest
    if: needs.info.outputs.make_release == 'true'
    outputs:
      url: ${{ steps.release.outputs.url }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check artifacts
        shell: bash
        run: |
          test -f "dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip" || { echo "Missing CurseForge artifact"; exit 1; }
          test -f "dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip" || { echo "Missing serverpack artifact"; exit 1; }

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.info.outputs.project_full_name }}
          tag_name: ${{ needs.info.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ needs.info.outputs.changelog }}
          files: |
            dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip
            dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip
          prerelease: ${{ needs.info.outputs.prerelease }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  discord-message:
    name: Discord Message
    needs: [info, release-github]
    runs-on: ubuntu-latest
    if: needs.info.outputs.send_discord == 'true'
    steps:
      - name: Send Discord message
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PROJECT_FULL_NAME: ${{ needs.info.outputs.project_full_name }}
          RELEASE_TYPE: ${{ needs.info.outputs.release_type }}
          MINECRAFT_VERSION: ${{ needs.info.outputs.minecraft_version }}
          LOADER_TYPE: ${{ needs.info.outputs.loader_type }}
          LOADER_VERSION: ${{ needs.info.outputs.loader_version }}
          RELEASE_URL: ${{ needs.release-github.outputs.url }}
          CHANGELOG: ${{ needs.info.outputs.changelog }}
        run: |
          python3 - <<'PY'
          import json
          import os

          changelog = os.environ["CHANGELOG"].strip()
          if len(changelog) > 1450:
              changelog = changelog[:1450].rstrip() + "\n- ..."

          content = f"""**Release**: `{os.environ['PROJECT_FULL_NAME']}`
          **Release Type**: `{os.environ['RELEASE_TYPE']}`
          **Game Version**: `{os.environ['MINECRAFT_VERSION']}`
          **Loader**: `{os.environ['LOADER_TYPE']}-{os.environ['LOADER_VERSION']}`

          [GitHub Release]({os.environ['RELEASE_URL']})
          ```markdown
          {changelog}
          ```"""

          with open("discord-payload.json", "w", encoding="utf-8") as payload:
              json.dump({"username": "Banana Farm", "content": content}, payload)
          PY

          curl -fsS \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK"

