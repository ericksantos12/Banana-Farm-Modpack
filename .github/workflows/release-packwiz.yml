name: Build and Release Packwiz Pack
run-name: "Packwiz Release #${{ github.run_number }}"

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  info:
    name: Pack Info
    uses: ./.github/workflows/packwiz-info.yml
    with:
      release_type: ${{ vars.RELEASE_TYPE }}
      fail_if_tag_exists: true

  build-project:
    name: Build Project
    needs: [info]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Cache Go build data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-packwiz

      - name: Install packwiz
        shell: bash
        run: |
          go install github.com/packwiz/packwiz@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Refresh packwiz index
        run: packwiz refresh

      - name: Export client and server packs
        shell: bash
        run: |
          mkdir -p dist
          packwiz curseforge export -s client -o "dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip"
          packwiz curseforge export -s server -o "dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip"

      - name: Upload CurseForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.info.outputs.project_file_name }}-curseforge
          path: dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip
          if-no-files-found: error

      - name: Upload serverpack artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.info.outputs.project_file_name }}-serverpack
          path: dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip
          if-no-files-found: error

#      - name: Export Modrinth pack
#        shell: bash
#        run: |
#          packwiz modrinth export -o "dist/${{ needs.info.outputs.project_file_name }}-modrinth.mrpack"
#
#      - name: Upload Modrinth artifact
#        uses: actions/upload-artifact@v4
#        with:
#          name: ${{ needs.info.outputs.project_file_name }}-modrinth
#          path: dist/${{ needs.info.outputs.project_file_name }}-modrinth.mrpack
#          if-no-files-found: error

  release-github:
    name: Release to GitHub
    needs: [info, build-project]
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.release.outputs.url }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check artifacts
        shell: bash
        run: |
          test -f "dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip" || { echo "Missing CurseForge artifact"; exit 1; }
          test -f "dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip" || { echo "Missing serverpack artifact"; exit 1; }

      - name: Create release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ needs.info.outputs.project_full_name }}
          tag_name: ${{ needs.info.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body: ${{ needs.info.outputs.changelog }}
          files: |
            dist/${{ needs.info.outputs.project_file_name }}-curseforge.zip
            dist/${{ needs.info.outputs.project_file_name }}-serverpack.zip
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  discord-message:
    name: Discord Message
    needs: [info, release-github]
    runs-on: ubuntu-latest
    steps:
      - name: Check Discord webhook
        id: webhook
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK" ]]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Send Discord message
        if: steps.webhook.outputs.present == 'true'
        shell: bash
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          PROJECT_FULL_NAME: ${{ needs.info.outputs.project_full_name }}
          RELEASE_TYPE: ${{ needs.info.outputs.release_type }}
          MINECRAFT_VERSION: ${{ needs.info.outputs.minecraft_version }}
          LOADER_TYPE: ${{ needs.info.outputs.loader_type }}
          LOADER_VERSION: ${{ needs.info.outputs.loader_version }}
          RELEASE_URL: ${{ needs.release-github.outputs.url }}
          CHANGELOG: ${{ needs.info.outputs.changelog }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import textwrap

          changelog = os.environ["CHANGELOG"].strip()
          if len(changelog) > 1450:
              changelog = changelog[:1450].rstrip() + "\n- ..."

          content = textwrap.dedent(f"""\
          **Release**: `{os.environ['PROJECT_FULL_NAME']}`
          **Release Type**: `{os.environ['RELEASE_TYPE']}`
          **Game Version**: `{os.environ['MINECRAFT_VERSION']}`
          **Loader**: `{os.environ['LOADER_TYPE']}-{os.environ['LOADER_VERSION']}`

          [GitHub Release]({os.environ['RELEASE_URL']})
          ```markdown
          {changelog}
          ```""")

          with open("discord-payload.json", "w", encoding="utf-8") as payload:
              json.dump({"username": "Banana Farm", "content": content}, payload)
          PY

          curl -fsS \
            -H "Content-Type: application/json" \
            -d @discord-payload.json \
            "$DISCORD_WEBHOOK"

